name: notifications

on:
  workflow_call:
    inputs:
      image-url:
        description: 'Optional image URL to display in the card header (e.g. extension icon)'
        required: false
        type: string
        default: ''
    secrets:
      teams-webhook-url:
        required: true

jobs:

  microsoft_teams:
    name: Microsoft Teams Notifications
    runs-on: ubuntu-latest
    steps:

      - name: Process image URL
        id: image
        env:
          RAW_IMAGE_URL: ${{ inputs.image-url }}
        run: |
          # Strip query string/fragment for extension check
          url_path="${RAW_IMAGE_URL%%\?*}"
          url_path="${url_path%%#*}"
          if [[ "$url_path" == *.svg ]]; then
            echo "url=https://images.weserv.nl/?url=$(printf '%s' "$RAW_IMAGE_URL" | jq -sRr @uri)&output=png&w=64" >> "$GITHUB_OUTPUT"
          else
            echo "url=$RAW_IMAGE_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: New release
        if: github.event_name == 'release' && github.event.action == 'published'
        env:
          WEBHOOK_URL: ${{ secrets.teams-webhook-url }}
          IMAGE_URL: ${{ steps.image.outputs.url }}
          REPO_NAME: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_ZIP: ${{ github.event.release.zipball_url }}
        run: |
          jq -n \
            --arg repo "$REPO_NAME" \
            --arg image "$IMAGE_URL" \
            --arg title "📦 New release: $RELEASE_TAG" \
            --arg name "$RELEASE_NAME" \
            --arg body "$(echo "$RELEASE_BODY" | head -c 2000)" \
            --arg url "$RELEASE_URL" \
            --arg zip "$RELEASE_ZIP" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    (if $image != "" then
                      { type: "ColumnSet", columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $image, size: "small" }] },
                        { type: "Column", width: "stretch", verticalContentAlignment: "center", items: [{ type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }] }
                      ]}
                    else
                      { type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }
                    end),
                    { type: "TextBlock", size: "medium", weight: "bolder", text: $title, color: "good" },
                    { type: "TextBlock", text: $name, weight: "bolder", wrap: true },
                    { type: "TextBlock", text: $body, wrap: true }
                  ],
                  actions: [
                    { type: "Action.OpenUrl", title: "Show release", url: $url },
                    { type: "Action.OpenUrl", title: "Download zip", url: $zip }
                  ]
                }
              }]
            }' | curl -sSf -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"

      - name: New issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        env:
          WEBHOOK_URL: ${{ secrets.teams-webhook-url }}
          IMAGE_URL: ${{ steps.image.outputs.url }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_AUTHOR_URL: ${{ github.event.issue.user.html_url }}
          ISSUE_AUTHOR_AVATAR: ${{ github.event.issue.user.avatar_url }}
        run: |
          jq -n \
            --arg repo "$REPO_NAME" \
            --arg image "$IMAGE_URL" \
            --arg title "🔥 New issue #${ISSUE_NUMBER}: \"${ISSUE_TITLE}\"" \
            --arg body "$(echo "$ISSUE_BODY" | head -c 2000)" \
            --arg url "$ISSUE_URL" \
            --arg author "$ISSUE_AUTHOR" \
            --arg author_url "$ISSUE_AUTHOR_URL" \
            --arg avatar "$ISSUE_AUTHOR_AVATAR" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    (if $image != "" then
                      { type: "ColumnSet", columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $image, size: "small" }] },
                        { type: "Column", width: "stretch", verticalContentAlignment: "center", items: [{ type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }] }
                      ]}
                    else
                      { type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }
                    end),
                    { type: "TextBlock", size: "medium", weight: "bolder", text: $title, color: "attention" },
                    {
                      type: "ColumnSet",
                      columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $avatar, size: "small", style: "person" }] },
                        { type: "Column", width: "stretch", items: [{ type: "TextBlock", text: ("[\($author)](\($author_url))"), weight: "bolder" }] }
                      ]
                    },
                    { type: "TextBlock", text: $body, wrap: true }
                  ],
                  actions: [
                    { type: "Action.OpenUrl", title: "View issue", url: $url }
                  ]
                }
              }]
            }' | curl -sSf -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"

      - name: Issue closed
        if: github.event_name == 'issues' && github.event.action == 'closed'
        env:
          WEBHOOK_URL: ${{ secrets.teams-webhook-url }}
          IMAGE_URL: ${{ steps.image.outputs.url }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          jq -n \
            --arg repo "$REPO_NAME" \
            --arg image "$IMAGE_URL" \
            --arg title "🏁 Issue #${ISSUE_NUMBER} closed: \"${ISSUE_TITLE}\"" \
            --arg url "$ISSUE_URL" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    (if $image != "" then
                      { type: "ColumnSet", columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $image, size: "small" }] },
                        { type: "Column", width: "stretch", verticalContentAlignment: "center", items: [{ type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }] }
                      ]}
                    else
                      { type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }
                    end),
                    { type: "TextBlock", size: "medium", weight: "bolder", text: $title, color: "accent" }
                  ],
                  actions: [
                    { type: "Action.OpenUrl", title: "View issue", url: $url }
                  ]
                }
              }]
            }' | curl -sSf -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"

      - name: New issue comment
        if: github.event_name == 'issue_comment' && github.event.action == 'created' && github.actor != 'coderabbitai' && github.actor != 'codecov-commenter' && github.event.sender.type != 'Bot'
        env:
          WEBHOOK_URL: ${{ secrets.teams-webhook-url }}
          IMAGE_URL: ${{ steps.image.outputs.url }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_AUTHOR_URL: ${{ github.event.comment.user.html_url }}
          COMMENT_AUTHOR_AVATAR: ${{ github.event.comment.user.avatar_url }}
        run: |
          jq -n \
            --arg repo "$REPO_NAME" \
            --arg image "$IMAGE_URL" \
            --arg title "💬 New comment on issue #${ISSUE_NUMBER}: \"${ISSUE_TITLE}\"" \
            --arg body "$(echo "$COMMENT_BODY" | head -c 2000)" \
            --arg url "$COMMENT_URL" \
            --arg author "$COMMENT_AUTHOR" \
            --arg author_url "$COMMENT_AUTHOR_URL" \
            --arg avatar "$COMMENT_AUTHOR_AVATAR" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    (if $image != "" then
                      { type: "ColumnSet", columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $image, size: "small" }] },
                        { type: "Column", width: "stretch", verticalContentAlignment: "center", items: [{ type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }] }
                      ]}
                    else
                      { type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }
                    end),
                    { type: "TextBlock", size: "medium", weight: "bolder", text: $title, color: "accent" },
                    {
                      type: "ColumnSet",
                      columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $avatar, size: "small", style: "person" }] },
                        { type: "Column", width: "stretch", items: [{ type: "TextBlock", text: ("[\($author)](\($author_url))"), weight: "bolder" }] }
                      ]
                    },
                    { type: "TextBlock", text: $body, wrap: true }
                  ],
                  actions: [
                    { type: "Action.OpenUrl", title: "View comment", url: $url }
                  ]
                }
              }]
            }' | curl -sSf -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"

      - name: New PR review comment
        if: github.event_name == 'pull_request_review_comment' && github.event.action == 'created' && github.actor != 'coderabbitai' && github.actor != 'codecov-commenter' && github.event.sender.type != 'Bot'
        env:
          WEBHOOK_URL: ${{ secrets.teams-webhook-url }}
          IMAGE_URL: ${{ steps.image.outputs.url }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_AUTHOR_URL: ${{ github.event.comment.user.html_url }}
          COMMENT_AUTHOR_AVATAR: ${{ github.event.comment.user.avatar_url }}
        run: |
          jq -n \
            --arg repo "$REPO_NAME" \
            --arg image "$IMAGE_URL" \
            --arg title "💬 New review comment on PR #${PR_NUMBER}: \"${PR_TITLE}\"" \
            --arg body "$(echo "$COMMENT_BODY" | head -c 2000)" \
            --arg url "$COMMENT_URL" \
            --arg author "$COMMENT_AUTHOR" \
            --arg author_url "$COMMENT_AUTHOR_URL" \
            --arg avatar "$COMMENT_AUTHOR_AVATAR" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    (if $image != "" then
                      { type: "ColumnSet", columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $image, size: "small" }] },
                        { type: "Column", width: "stretch", verticalContentAlignment: "center", items: [{ type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }] }
                      ]}
                    else
                      { type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }
                    end),
                    { type: "TextBlock", size: "medium", weight: "bolder", text: $title, color: "accent" },
                    {
                      type: "ColumnSet",
                      columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $avatar, size: "small", style: "person" }] },
                        { type: "Column", width: "stretch", items: [{ type: "TextBlock", text: ("[\($author)](\($author_url))"), weight: "bolder" }] }
                      ]
                    },
                    { type: "TextBlock", text: $body, wrap: true }
                  ],
                  actions: [
                    { type: "Action.OpenUrl", title: "View comment", url: $url }
                  ]
                }
              }]
            }' | curl -sSf -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"

      - name: New star
        if: github.event_name == 'watch' && github.event.action == 'started'
        env:
          WEBHOOK_URL: ${{ secrets.teams-webhook-url }}
          IMAGE_URL: ${{ steps.image.outputs.url }}
          REPO_NAME: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          ACTOR_URL: ${{ github.event.sender.html_url }}
          ACTOR_AVATAR: ${{ github.event.sender.avatar_url }}
          REPO_URL: ${{ github.event.repository.html_url }}
          REPO_STARS: ${{ github.event.repository.stargazers_count }}
          REPO_FORKS: ${{ github.event.repository.forks_count }}
          REPO_DESCRIPTION: ${{ github.event.repository.description }}
        run: |
          jq -n \
            --arg repo "$REPO_NAME" \
            --arg image "$IMAGE_URL" \
            --arg title "⭐️ New star on ${REPO_NAME} by ${ACTOR}!" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg avatar "$ACTOR_AVATAR" \
            --arg repo_url "$REPO_URL" \
            --arg stars "$REPO_STARS" \
            --arg forks "$REPO_FORKS" \
            --arg description "$REPO_DESCRIPTION" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    (if $image != "" then
                      { type: "ColumnSet", columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $image, size: "small" }] },
                        { type: "Column", width: "stretch", verticalContentAlignment: "center", items: [{ type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }] }
                      ]}
                    else
                      { type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }
                    end),
                    { type: "TextBlock", size: "medium", weight: "bolder", text: $title, color: "warning" },
                    {
                      type: "ColumnSet",
                      columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $avatar, size: "small", style: "person" }] },
                        { type: "Column", width: "stretch", verticalContentAlignment: "center", items: [{ type: "TextBlock", text: ("[\($actor)](\($actor_url))"), weight: "bolder" }] }
                      ]
                    },
                    (if $description != "" then
                      { type: "TextBlock", text: $description, wrap: true, size: "small", isSubtle: true }
                    else
                      null
                    end),
                    {
                      type: "FactSet",
                      facts: [
                        { title: "⭐ Stars", value: $stars },
                        { title: "🍴 Forks", value: $forks }
                      ]
                    }
                  ] | map(select(. != null)),
                  actions: [
                    { type: "Action.OpenUrl", title: "View repository", url: $repo_url },
                    { type: "Action.OpenUrl", title: "View stargazer", url: $actor_url }
                  ]
                }
              }]
            }' | curl -sSf -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"

      - name: New pull request
        if: github.event_name == 'pull_request_target' && github.event.action == 'opened' && github.actor != 'renovate' && github.event.sender.type != 'Bot'
        env:
          WEBHOOK_URL: ${{ secrets.teams-webhook-url }}
          IMAGE_URL: ${{ steps.image.outputs.url }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_URL: ${{ github.event.pull_request.user.html_url }}
          PR_AUTHOR_AVATAR: ${{ github.event.pull_request.user.avatar_url }}
          PR_COMMITS: ${{ github.event.pull_request.commits }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
        run: |
          jq -n \
            --arg repo "$REPO_NAME" \
            --arg image "$IMAGE_URL" \
            --arg title "🛠️ New pull request #${PR_NUMBER}: \"${PR_TITLE}\"" \
            --arg body "$(echo "$PR_BODY" | head -c 2000)" \
            --arg url "$PR_URL" \
            --arg author "$PR_AUTHOR" \
            --arg author_url "$PR_AUTHOR_URL" \
            --arg avatar "$PR_AUTHOR_AVATAR" \
            --arg commits "$PR_COMMITS" \
            --arg files "$PR_CHANGED_FILES" \
            --arg additions "+${PR_ADDITIONS}" \
            --arg deletions "-${PR_DELETIONS}" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: [
                    (if $image != "" then
                      { type: "ColumnSet", columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $image, size: "small" }] },
                        { type: "Column", width: "stretch", verticalContentAlignment: "center", items: [{ type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }] }
                      ]}
                    else
                      { type: "TextBlock", text: $repo, weight: "bolder", size: "small", color: "accent" }
                    end),
                    { type: "TextBlock", size: "medium", weight: "bolder", text: $title, color: "attention" },
                    {
                      type: "ColumnSet",
                      columns: [
                        { type: "Column", width: "auto", items: [{ type: "Image", url: $avatar, size: "small", style: "person" }] },
                        { type: "Column", width: "stretch", items: [{ type: "TextBlock", text: ("[\($author)](\($author_url))"), weight: "bolder" }] }
                      ]
                    },
                    { type: "TextBlock", text: $body, wrap: true },
                    {
                      type: "FactSet",
                      facts: [
                        { title: "Commits", value: $commits },
                        { title: "File changes", value: $files },
                        { title: "Additions", value: $additions },
                        { title: "Deletions", value: $deletions }
                      ]
                    }
                  ],
                  actions: [
                    { type: "Action.OpenUrl", title: "View pull request", url: $url }
                  ]
                }
              }]
            }' | curl -sSf -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
